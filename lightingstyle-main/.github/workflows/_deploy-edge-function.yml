name: Reusable Edge Function Deploy

on:
  workflow_call:
    inputs:
      function_name:
        required: true
        type: string
      deploy_environment:
        required: false
        type: string
        default: production
      extra_args:
        required: false
        type: string
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    concurrency:
      group: deploy-${{ inputs.function_name }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Wait for Quality Gate
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/commits/{sha}/check-runs?per_page=100"
          deadline = time.time() + 20 * 60
          target_name = "Quality Gate (Sync + Build)"

          while True:
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "edge-deploy-gate",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  if exc.code in (401, 403):
                      print("No checks permission available for this token; skipping quality gate wait.")
                      break
                  raise

              runs = [r for r in payload.get("check_runs", []) if r.get("name") == target_name]
              if runs:
                  run = sorted(runs, key=lambda r: (r.get("started_at") or "", r.get("id") or 0))[-1]
                  status = run.get("status")
                  conclusion = run.get("conclusion")
                  print(f"Quality Gate status={status} conclusion={conclusion}")

                  if status == "completed":
                      if conclusion == "success":
                          print("Quality Gate passed.")
                          break
                      raise SystemExit(f"Quality Gate did not pass (conclusion={conclusion}). Blocking deploy.")
              else:
                  print("Quality Gate check run not found yet; waiting...")

              if time.time() >= deadline:
                  raise SystemExit("Timed out waiting for Quality Gate completion.")

              time.sleep(10)
          PY

      - name: Validate Supabase deploy secrets
        run: |
          test -n "${SUPABASE_ACCESS_TOKEN}" || { echo "Missing SUPABASE_ACCESS_TOKEN secret"; exit 1; }
          test -n "${SUPABASE_PROJECT_REF}" || { echo "Missing SUPABASE_PROJECT_REF secret"; exit 1; }
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy ${{ inputs.function_name }}
        run: npx supabase@latest functions deploy "${{ inputs.function_name }}" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" ${{ inputs.extra_args }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
