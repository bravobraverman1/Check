name: Deploy cleanup-cloudinary Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/cleanup-cloudinary/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/deploy-cleanup-cloudinary.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-edge-function.yml
    with:
      function_name: cleanup-cloudinary
    secrets: inherit
