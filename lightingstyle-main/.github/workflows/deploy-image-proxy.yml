name: Deploy image-proxy Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/image-proxy/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/deploy-image-proxy.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-edge-function.yml
    with:
      function_name: image-proxy
    secrets: inherit
