name: Deploy cloudinary-sign-upload Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/cloudinary-sign-upload/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/deploy-cloudinary-sign-upload.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-edge-function.yml
    with:
      function_name: cloudinary-sign-upload
    secrets: inherit
