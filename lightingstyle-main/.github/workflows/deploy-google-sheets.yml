name: Deploy Google Sheets Connection

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/google-sheets/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/deploy-google-sheets.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-edge-function.yml
    with:
      function_name: google-sheets
    secrets: inherit
