name: Deploy billing-snapshot Edge Function
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/billing-snapshot/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/deploy-billing-snapshot.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-edge-function.yml
    with:
      function_name: billing-snapshot
    secrets: inherit
