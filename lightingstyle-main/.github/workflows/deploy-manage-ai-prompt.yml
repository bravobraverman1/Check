name: Deploy manage-ai-prompt Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/manage-ai-prompt/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/deploy-manage-ai-prompt.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-edge-function.yml
    with:
      function_name: manage-ai-prompt
    secrets: inherit
