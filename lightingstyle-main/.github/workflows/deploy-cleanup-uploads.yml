name: Deploy cleanup-uploads Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/cleanup-uploads/**'
      - 'supabase/functions/_shared/**'
      - '.github/workflows/deploy-cleanup-uploads.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-edge-function.yml
    with:
      function_name: cleanup-uploads
    secrets: inherit
