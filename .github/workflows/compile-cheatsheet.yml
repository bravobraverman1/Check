name: Compile probability cheat sheet

on:
  push:
    paths:
      - 'chatgpt-temp/TAU_Probability_Statistics_Final_Precision.tex'
      - '.github/workflows/compile-cheatsheet.yml'
  pull_request:
    paths:
      - 'chatgpt-temp/TAU_Probability_Statistics_Final_Precision.tex'
      - '.github/workflows/compile-cheatsheet.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: chatgpt-temp/TAU_Probability_Statistics_Final_Precision.tex
          working_directory: .
          latexmk_use_xelatex: false
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode
      - name: Store compiled PDF
        if: github.event_name != 'pull_request'
        run: |
          cp TAU_Probability_Statistics_Final_Precision.pdf chatgpt-temp/TAU_Probability_Statistics_Final_Precision.pdf
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add chatgpt-temp/TAU_Probability_Statistics_Final_Precision.pdf
          git commit -m 'Store compiled probability cheat sheet PDF' || exit 0
          git push
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: probability-cheat-sheet-pdf
          path: TAU_Probability_Statistics_Final_Precision.pdf
